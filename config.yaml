audio:
  sample_rate: 
    - 25000  # Informational only; actual value is loaded from the dataset
    - 22500  # Informational only; actual value is loaded from the dataset
  normalize: peak
  dc_remove: True
  trim_signal: True
  preserve: middle

features:
  n_fft: 2048
  n_filters: 20
  fmax: 4000
  overlap: 0.5
  frame_size_ms: 30
  hop_size_ms: 10
  window_type: Hann
  edge_trim_frames: 2

acoustic_features:
  f0_min: 75
  f0_max: 400
  jitter_params: [0.0001, 0.02, 1.3]
  shimmer_window: 0.03
  shimmer_params: [1.3, 1.6]
  hnr_params: [0.01, 75, 0.1, 1.0]

data:
  # Dataset names used to build paths inside CORPORA_ROOT
  # (shared corpora directory located outside this repository)
  corpora:
    - mysMEEI
    - myUSP

data_cleaning:
  duplicate_subjects:
    - file: "JXS09AN.WAV"
      groups: ['UVFP', 'edema']

class_merging:
  # In the original paper, Reinke's edema and vocal nodules
  # were merged into a single 'physio' class
  groups_to_merge: ['edema', 'nodulo']
  merged_label: physio

pca:
  retained_components:
    min: 2
    max: 15

experiments:
  num_iters: 100

results:
  figures_dir: results/figures
  metrics_dir: results/metrics